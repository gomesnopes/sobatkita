<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOBAT KITA - Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased">
    
    <!-- Top Navigation -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <!-- Brand & Logo -->
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 bg-indigo-600 rounded flex items-center justify-center shadow-sm">
                        <i data-lucide="pill" class="text-white w-5 h-5"></i>
                    </div>
                    <span class="font-semibold text-xl tracking-tight text-slate-900">SOBAT KITA</span>
                </div>
                <!-- Nav Links -->
                <nav class="hidden md:flex space-x-8">
                    <a href="#" class="flex items-center text-indigo-600 font-medium border-b-2 border-indigo-600 px-1 py-5">
                        <i data-lucide="layout-dashboard" class="w-4 h-4 mr-2"></i> Dashboard
                    </a>
                    <a href="#" class="flex items-center text-slate-500 hover:text-slate-900 font-medium px-1 py-5 transition">
                        <i data-lucide="settings" class="w-4 h-4 mr-2"></i> Pengaturan
                    </a>
                </nav>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 gap-4">
            <div>
                <h1 class="text-2xl font-semibold text-slate-900">Dashboard Analitik</h1>
                <p class="text-sm text-slate-500 mt-1">Pantau pesanan dan performa pengantaran obat.</p>
            </div>
            <button id="btnNewOrder" class="bg-indigo-600 text-white px-5 py-2.5 rounded-lg text-sm font-medium flex items-center hover:bg-indigo-700 shadow-sm transition">
                <i data-lucide="plus" class="w-4 h-4 mr-2"></i> Pesanan Baru
            </button>
        </div>

        <!-- Analytics Cards dengan Aksen Warna -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-xl border border-slate-100 shadow-sm relative overflow-hidden">
                <div class="absolute top-0 left-0 w-1 h-full bg-indigo-500"></div>
                <div class="text-slate-500 text-sm mb-2 flex items-center gap-2">
                    <i data-lucide="shopping-bag" class="w-4 h-4 text-indigo-500"></i> Total Pesanan
                </div>
                <div class="text-3xl font-semibold text-slate-800" id="totalOrders">0</div>
            </div>
            <div class="bg-white p-6 rounded-xl border border-slate-100 shadow-sm relative overflow-hidden">
                <div class="absolute top-0 left-0 w-1 h-full bg-amber-500"></div>
                <div class="text-slate-500 text-sm mb-2 flex items-center gap-2">
                    <i data-lucide="clock" class="w-4 h-4 text-amber-500"></i> Menunggu Kurir
                </div>
                <div class="text-3xl font-semibold text-slate-800" id="waitingOrders">0</div>
            </div>
            <div class="bg-white p-6 rounded-xl border border-slate-100 shadow-sm relative overflow-hidden">
                <div class="absolute top-0 left-0 w-1 h-full bg-emerald-500"></div>
                <div class="text-slate-500 text-sm mb-2 flex items-center gap-2">
                    <i data-lucide="check-circle" class="w-4 h-4 text-emerald-500"></i> Selesai
                </div>
                <div class="text-3xl font-semibold text-slate-800" id="completedOrders">0</div>
            </div>
        </div>

        <!-- Table Section -->
        <div class="bg-white rounded-xl border border-slate-100 shadow-sm overflow-hidden">
            <div class="p-5 border-b border-slate-100 flex flex-col sm:flex-row gap-4 justify-between bg-slate-50/50">
                <div class="relative w-full sm:w-64">
                    <i data-lucide="search" class="w-4 h-4 absolute left-3 top-2.5 text-slate-400"></i>
                    <input type="text" placeholder="Cari pesanan..." class="w-full pl-9 pr-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition">
                </div>
                <input type="date" class="border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 transition">
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50 text-xs text-slate-500 uppercase tracking-wider border-b border-slate-200">
                            <th class="p-4 font-medium">No Resep</th>
                            <th class="p-4 font-medium">Pasien</th>
                            <th class="p-4 font-medium">Alamat</th>
                            <th class="p-4 font-medium">Status</th>
                            <th class="p-4 font-medium text-center">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="orderTableBody" class="text-sm divide-y divide-slate-100">
                        <!-- Data di-inject oleh JS -->
                    </tbody>
                </table>
            </div>
            <div class="p-4 border-t border-slate-100 text-sm text-slate-500 flex justify-between items-center bg-slate-50/50">
                <span>Menampilkan data terbaru</span>
                <div class="flex gap-1">
                    <button class="px-3 py-1.5 border border-slate-200 rounded hover:bg-slate-100 transition text-slate-600">&lt;</button>
                    <button class="px-3 py-1.5 border border-slate-200 rounded hover:bg-slate-100 transition text-slate-600">&gt;</button>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal Form Pesanan Baru -->
    <div id="modalOrder" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white p-6 md:p-8 rounded-2xl w-full max-w-md shadow-xl">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-semibold text-slate-800">Buat Pesanan Baru</h2>
                <button id="closeOrderModal" class="text-slate-400 hover:text-slate-600 transition"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <form id="formOrder" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">No Resep</label>
                    <input type="text" id="no_resep" required class="w-full border border-slate-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Nama Pasien</label>
                    <input type="text" id="nama_pasien" required class="w-full border border-slate-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Alamat Tujuan</label>
                    <textarea id="alamat" rows="3" required class="w-full border border-slate-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition outline-none"></textarea>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Patokan Detail</label>
                    <input type="text" id="patokan" class="w-full border border-slate-300 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition outline-none">
                </div>
                <div class="pt-4">
                    <button type="submit" class="w-full py-2.5 text-sm font-medium bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition shadow-sm">Simpan & Cetak QR</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal Struk & QR Code -->
    <div id="modalReceipt" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white p-8 rounded-2xl w-full max-w-sm shadow-xl text-center border-t-4 border-indigo-600">
            <h2 class="text-xl font-bold mb-4 text-slate-800">Struk Pengantaran</h2>
            <div id="receiptDetails" class="text-sm text-slate-600 mb-6 text-left space-y-2 bg-slate-50 p-4 rounded-lg border border-slate-100"></div>
            <div id="qrcode" class="flex justify-center mb-8 p-4 bg-white border border-slate-100 rounded-xl shadow-sm mx-auto w-max"></div>
            <div class="flex gap-3">
                <button type="button" id="closeReceiptModal" class="flex-1 px-4 py-2 text-sm font-medium border border-slate-300 text-slate-700 rounded-lg hover:bg-slate-50 transition">Tutup</button>
                <button type="button" onclick="window.print()" class="flex-1 px-4 py-2 text-sm font-medium bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition flex items-center justify-center">
                    <i data-lucide="printer" class="w-4 h-4 mr-2"></i> Print
                </button>
            </div>
        </div>
    </div>

    <script type="module" src="admin.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
