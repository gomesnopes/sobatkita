<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOBAT KITA - Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased">
    <div class="flex h-screen">
        <aside class="w-64 bg-white border-r border-gray-200 flex flex-col">
            <div class="h-16 flex items-center px-6 border-b border-gray-200">
                <div class="w-8 h-8 bg-gray-900 rounded flex items-center justify-center mr-3">
                    <i data-lucide="pill" class="text-white w-5 h-5"></i>
                </div>
                <span class="font-semibold text-lg tracking-tight">SOBAT KITA</span>
            </div>
            <nav class="flex-1 p-4 space-y-1">
                <a href="#" class="flex items-center px-3 py-2 bg-gray-100 rounded-md text-sm font-medium">
                    <i data-lucide="layout-dashboard" class="w-4 h-4 mr-3"></i> Dashboard
                </a>
                <a href="#" class="flex items-center px-3 py-2 hover:bg-gray-50 rounded-md text-sm font-medium text-gray-600">
                    <i data-lucide="settings" class="w-4 h-4 mr-3"></i> Pengaturan
                </a>
            </nav>
        </aside>

        <main class="flex-1 overflow-y-auto p-8">
            <div class="flex justify-between items-center mb-8">
                <h1 class="text-2xl font-semibold">Dashboard Analitik</h1>
                <button id="btnNewOrder" class="bg-gray-900 text-white px-4 py-2 rounded-md text-sm font-medium flex items-center hover:bg-gray-800 transition">
                    <i data-lucide="plus" class="w-4 h-4 mr-2"></i> Pesanan Baru
                </button>
            </div>

            <div class="grid grid-cols-3 gap-6 mb-8">
                <div class="bg-white p-6 rounded-xl border border-gray-100 shadow-sm">
                    <div class="text-gray-500 text-sm mb-1">Total Pesanan</div>
                    <div class="text-3xl font-semibold" id="totalOrders">0</div>
                </div>
                <div class="bg-white p-6 rounded-xl border border-gray-100 shadow-sm">
                    <div class="text-gray-500 text-sm mb-1">Menunggu Kurir</div>
                    <div class="text-3xl font-semibold" id="waitingOrders">0</div>
                </div>
                <div class="bg-white p-6 rounded-xl border border-gray-100 shadow-sm">
                    <div class="text-gray-500 text-sm mb-1">Selesai</div>
                    <div class="text-3xl font-semibold" id="completedOrders">0</div>
                </div>
            </div>

            <div class="bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden">
                <div class="p-4 border-b border-gray-100 flex gap-4">
                    <input type="text" placeholder="Cari pesanan..." class="border border-gray-200 rounded-md px-3 py-1.5 text-sm w-64 focus:outline-none focus:ring-1 focus:ring-gray-900">
                    <input type="date" class="border border-gray-200 rounded-md px-3 py-1.5 text-sm focus:outline-none focus:ring-1 focus:ring-gray-900">
                </div>
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50 text-xs text-gray-500 uppercase tracking-wider">
                            <th class="p-4 font-medium">No Resep</th>
                            <th class="p-4 font-medium">Pasien</th>
                            <th class="p-4 font-medium">Alamat</th>
                            <th class="p-4 font-medium">Status</th>
                            <th class="p-4 font-medium">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="orderTableBody" class="text-sm divide-y divide-gray-100">
                        </tbody>
                </table>
                <div class="p-4 border-t border-gray-100 text-sm text-gray-500 flex justify-between">
                    <span>Menampilkan 1-10 dari 100</span>
                    <div class="flex gap-2">
                        <button class="px-2 py-1 border rounded hover:bg-gray-50">&lt;</button>
                        <button class="px-2 py-1 border rounded hover:bg-gray-50">&gt;</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="modalOrder" class="fixed inset-0 bg-gray-900/50 hidden flex items-center justify-center">
        <div class="bg-white p-6 rounded-xl w-full max-w-md shadow-lg">
            <h2 class="text-lg font-semibold mb-4">Buat Pesanan Baru</h2>
            <form id="formOrder" class="space-y-4">
                <div>
                    <label class="block text-sm text-gray-600 mb-1">No Resep</label>
                    <input type="text" id="no_resep" required class="w-full border border-gray-200 rounded-md px-3 py-2 text-sm focus:ring-1 focus:ring-gray-900 focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-1">Nama Pasien</label>
                    <input type="text" id="nama_pasien" required class="w-full border border-gray-200 rounded-md px-3 py-2 text-sm focus:ring-1 focus:ring-gray-900 focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-1">Alamat Tujuan</label>
                    <textarea id="alamat" required class="w-full border border-gray-200 rounded-md px-3 py-2 text-sm focus:ring-1 focus:ring-gray-900 focus:outline-none"></textarea>
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-1">Patokan Detail</label>
                    <input type="text" id="patokan" class="w-full border border-gray-200 rounded-md px-3 py-2 text-sm focus:ring-1 focus:ring-gray-900 focus:outline-none">
                </div>
                <div class="flex justify-end gap-2 mt-6">
                    <button type="button" id="closeOrderModal" class="px-4 py-2 text-sm border border-gray-200 rounded-md hover:bg-gray-50">Batal</button>
                    <button type="submit" class="px-4 py-2 text-sm bg-gray-900 text-white rounded-md hover:bg-gray-800">Simpan & Cetak</button>
                </div>
            </form>
        </div>
    </div>

    <div id="modalReceipt" class="fixed inset-0 bg-gray-900/50 hidden flex items-center justify-center">
        <div class="bg-white p-8 rounded-xl w-full max-w-sm shadow-lg text-center">
            <h2 class="text-xl font-bold mb-2">Struk Pengantaran</h2>
            <div id="receiptDetails" class="text-sm text-gray-600 mb-6 text-left space-y-1"></div>
            <div id="qrcode" class="flex justify-center mb-6"></div>
            <div class="flex justify-between gap-2">
                <button type="button" id="closeReceiptModal" class="flex-1 px-4 py-2 text-sm border border-gray-200 rounded-md hover:bg-gray-50">Tutup</button>
                <button type="button" onclick="window.print()" class="flex-1 px-4 py-2 text-sm bg-gray-900 text-white rounded-md hover:bg-gray-800">
                    <i data-lucide="printer" class="w-4 h-4 inline mr-1"></i> Print
                </button>
            </div>
        </div>
    </div>

    <script type="module" src="admin.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
