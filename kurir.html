<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOBAT KITA - Kurir</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
</head>
<body class="bg-slate-100 text-slate-800 font-sans antialiased selection:bg-indigo-100 selection:text-indigo-900">

    <div class="max-w-md mx-auto bg-white min-h-screen shadow-md flex flex-col relative overflow-hidden">
        
        <div id="loginView" class="flex-1 flex flex-col justify-center px-6 py-12 hidden">
            <div class="text-center mb-8">
                <div class="w-32 h-32 bg-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg p-3">
                    <img src="assets/logo-putih.png" alt="Logo SOBAT KITA" class="w-full h-full object-contain">
                </div>
                <h1 class="text-2xl font-bold text-slate-900">Portal Kurir</h1>
                <p class="text-slate-500 text-sm mt-1">Masuk untuk mulai mengantar pesanan</p>
            </div>
            
            <form id="formLogin" class="space-y-5">
                <div id="loginError" class="hidden bg-red-50 text-red-600 text-sm p-3 rounded-lg border border-red-100 text-center">
                    Username atau No HP salah.
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Username</label>
                    <input type="text" id="loginUsername" required class="w-full border border-slate-300 rounded-lg px-4 py-3 text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Nomor HP</label>
                    <input type="tel" id="loginNohp" required class="w-full border border-slate-300 rounded-lg px-4 py-3 text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition">
                </div>
                <button type="submit" id="btnLogin" class="w-full bg-indigo-600 text-white rounded-lg px-4 py-3 font-medium hover:bg-indigo-700 transition shadow-md flex justify-center items-center">
                    Masuk
                </button>
            </form>
        </div>

        <div id="mainView" class="flex-1 flex flex-col hidden">
            <header class="bg-white border-b border-slate-200 p-4 flex justify-between items-center sticky top-0 z-10">
                <div class="flex items-center gap-3">
                    <img src="assets/logo-warna.png" alt="Logo SOBAT KITA" class="h-10 w-auto object-contain">
                    <div>
                        <p class="text-xs text-slate-500 font-medium uppercase tracking-wider">Halo,</p>
                        <h2 id="kurirNameDisplay" class="text-base font-bold text-slate-900 leading-tight truncate max-w-[120px]">Nama Kurir</h2>
                    </div>
                </div>
                <button id="btnLogout" class="p-2 text-slate-400 hover:text-red-500 transition rounded-full hover:bg-red-50" title="Keluar">
                    <i data-lucide="log-out" class="w-5 h-5"></i>
                </button>
            </header>

            <main class="flex-1 overflow-y-auto p-4 bg-slate-50">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-semibold text-slate-800">Tugas Anda</h3>
                </div>
                <div id="courierOrders" class="space-y-4 pb-24">
                    </div>
            </main>

            <div class="absolute bottom-6 left-0 right-0 px-6">
                <button id="btnOpenScanner" class="w-full bg-indigo-600 text-white shadow-lg shadow-indigo-600/30 rounded-2xl py-4 font-semibold text-lg flex justify-center items-center gap-2 hover:bg-indigo-700 transition active:scale-95">
                    <i data-lucide="scan-line" class="w-6 h-6"></i> Ambil Pesanan
                </button>
            </div>
        </div>

        <div id="scannerView" class="fixed inset-0 bg-slate-900 z-50 flex flex-col hidden">
            <div class="p-4 flex justify-between items-center bg-slate-900/80 backdrop-blur-md absolute top-0 left-0 right-0 z-10">
                <h2 class="text-white font-medium">Arahkan ke QR Code Admin</h2>
                <button id="btnCloseScanner" class="bg-white/20 p-2 rounded-full text-white hover:bg-white/30 transition">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <div class="flex-1 flex items-center justify-center bg-black relative">
                <div id="reader" class="w-full max-w-sm overflow-hidden"></div>
                <div class="absolute inset-0 pointer-events-none border-[40px] border-black/50">
                    <div class="w-full h-full border-2 border-indigo-500 rounded-lg relative">
                        <div class="absolute top-0 left-0 w-8 h-8 border-t-4 border-l-4 border-indigo-400 rounded-tl-lg -mt-1 -ml-1"></div>
                        <div class="absolute top-0 right-0 w-8 h-8 border-t-4 border-r-4 border-indigo-400 rounded-tr-lg -mt-1 -mr-1"></div>
                        <div class="absolute bottom-0 left-0 w-8 h-8 border-b-4 border-l-4 border-indigo-400 rounded-bl-lg -mb-1 -ml-1"></div>
                        <div class="absolute bottom-0 right-0 w-8 h-8 border-b-4 border-r-4 border-indigo-400 rounded-br-lg -mb-1 -mr-1"></div>
                    </div>
                </div>
            </div>
            <div class="p-6 bg-slate-900 absolute bottom-0 left-0 right-0 text-center">
                <p class="text-slate-400 text-sm">Pastikan QR Code terlihat jelas di dalam kotak</p>
            </div>
        </div>

    </div>

    <script type="module" src="kurir.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
