<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracking SOBAT KITA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">
    <div class="bg-white w-full max-w-sm rounded-2xl shadow-sm border border-gray-100 p-8 text-center" id="trackingContent">
        <div class="animate-pulse flex flex-col items-center space-y-4">
            <div class="rounded-full bg-gray-200 h-12 w-12"></div>
            <div class="h-4 bg-gray-200 rounded w-3/4"></div>
            <div class="h-4 bg-gray-200 rounded w-1/2"></div>
        </div>
    </div>

    <script type="module" src="tracking.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
