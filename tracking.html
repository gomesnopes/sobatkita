<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lacak Pesanan - SOBAT KITA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen p-4 font-sans antialiased">
    
    <div class="bg-white w-full max-w-sm rounded-2xl shadow-lg border border-slate-200 overflow-hidden" id="trackingContainer">
        
       <div class="bg-indigo-600 p-6 text-center">
    <div class="w-24 h-24 flex items-center justify-center mx-auto mb-3">
    <img src="assets/logo-putih.png" alt="Logo SOBAT KITA" class="w-full h-full object-contain">
</div>
    <h1 class="text-white font-bold text-lg tracking-wide">SOBAT KITA</h1>

</div>

        <div class="p-6 text-center" id="trackingContent">
            <div class="animate-pulse flex flex-col items-center space-y-4 py-4">
                <div class="rounded-full bg-slate-200 h-16 w-16"></div>
                <div class="h-4 bg-slate-200 rounded w-3/4"></div>
                <div class="h-4 bg-slate-200 rounded w-1/2"></div>
            </div>
        </div>

    </div>

    <script type="module" src="tracking.js"></script>
    <script>lucide.createIcons();</script>

</html>
